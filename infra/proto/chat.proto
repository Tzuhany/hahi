syntax = "proto3";
package hahi.chat;

import "common.proto";
import "agent_event.proto";

service AgentExecutionService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc ResumeRun(ResumeRunRequest) returns (SendMessageResponse);
  rpc CancelRun(CancelRunRequest) returns (CancelRunResponse);
  rpc GetRunStatus(GetRunStatusRequest) returns (GetRunStatusResponse);
}

service ConversationService {
  rpc GetConversation(GetConversationRequest) returns (GetConversationResponse);
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);
  rpc DeleteConversation(DeleteConversationRequest) returns (DeleteConversationResponse);
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);
}

message SendMessageRequest {
  string conversation_id = 1;
  string user_id = 2;
  string content = 3;
}

message SendMessageResponse {
  string message_id = 1;
  // Redis Stream key (results:{conversation_id}) for Gateway SSE subscription.
  // The client connects to GET /stream?key={stream_key} to receive real-time events.
  string stream_key = 2;
}

message ResumeRunRequest {
  string conversation_id = 1;
  string user_id = 2;
  hahi.agent_event.ControlResponse control = 3;
}

message CancelRunRequest {
  string conversation_id = 1;
}

message CancelRunResponse {
  bool cancelled = 1;
}

message GetRunStatusRequest {
  string conversation_id = 1;
}

message GetRunStatusResponse {
  string state = 1;
  optional string active_request_id = 2;
}

message GetConversationRequest {
  string conversation_id = 1;
}

message GetConversationResponse {
  string id = 1;
  string user_id = 2;
  string title = 3;
  string created_at = 4;
  string updated_at = 5;
}

message ListConversationsRequest {
  string user_id = 1;
  hahi.common.Pagination pagination = 2;
}

message ListConversationsResponse {
  repeated GetConversationResponse conversations = 1;
  hahi.common.PaginationMeta meta = 2;
}

message DeleteConversationRequest {
  string conversation_id = 1;
}

message DeleteConversationResponse {}

message ListMessagesRequest {
  string conversation_id = 1;
  hahi.common.Pagination pagination = 2;
}

message ChatMessage {
  string id = 1;
  string role = 2;
  string content = 3;
  string created_at = 4;
}

message ListMessagesResponse {
  repeated ChatMessage messages = 1;
  hahi.common.PaginationMeta meta = 2;
}
