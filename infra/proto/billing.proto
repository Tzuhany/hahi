syntax = "proto3";
package hahi.billing;

service BillingService {
  rpc CheckQuota(CheckQuotaRequest) returns (CheckQuotaResponse);
  rpc DeductUsage(DeductUsageRequest) returns (DeductUsageResponse);
  rpc GetUsage(GetUsageRequest) returns (GetUsageResponse);
}

message CheckQuotaRequest {
  string user_id = 1;
}

message CheckQuotaResponse {
  bool allowed = 1;
  int64 remaining_tokens = 2;
}

message DeductUsageRequest {
  string user_id = 1;
  int64 input_tokens = 2;
  int64 output_tokens = 3;
  string model = 4;
  string conversation_id = 5;
}

message DeductUsageResponse {
  int64 remaining_tokens = 1;
}

message GetUsageRequest {
  string user_id = 1;
  string period = 2;
}

message GetUsageResponse {
  int64 total_input_tokens = 1;
  int64 total_output_tokens = 2;
  int64 total_cost_cents = 3;
}
