syntax = "proto3";
package hahi.chat;

import "common.proto";
import "agent_event.proto";
import "events.proto";

// ============================================================================
// Enumerations
// ============================================================================

/// Lifecycle state of an agent run.
enum RunStatus {
  RUN_STATUS_UNSPECIFIED  = 0;
  RUN_STATUS_PENDING      = 1;
  RUN_STATUS_RUNNING      = 2;
  RUN_STATUS_COMPLETING   = 3;
  RUN_STATUS_COMPLETED    = 4;
  RUN_STATUS_FAILED       = 5;
  RUN_STATUS_INTERRUPTED  = 6;
}

/// Role of a chat message participant.
enum MessageRole {
  MESSAGE_ROLE_UNSPECIFIED = 0;
  MESSAGE_ROLE_USER        = 1;
  MESSAGE_ROLE_ASSISTANT   = 2;
}

// ============================================================================
// AgentExecutionService — run lifecycle + real-time event streaming
//
// Flow:
//   1. Client calls SendMessage  → session creates Run, dispatches to Agent
//   2. Client calls StreamEvents → server-streaming RPC, receives events
//   3. On disconnect, client reconnects with last_event_id → seamless resume
// ============================================================================

service AgentExecutionService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc StreamEvents(StreamEventsRequest) returns (stream hahi.events.EventFrame);
  rpc ResumeRun(ResumeRunRequest) returns (ResumeRunResponse);
  rpc CancelRun(CancelRunRequest) returns (CancelRunResponse);
  rpc GetRunStatus(GetRunStatusRequest) returns (GetRunStatusResponse);
}

// ============================================================================
// ThreadService — thread and message CRUD
// ============================================================================

service ThreadService {
  rpc CreateThread(CreateThreadRequest) returns (ThreadProto);
  rpc GetThread(GetThreadRequest) returns (ThreadProto);
  rpc ListThreads(ListThreadsRequest) returns (ListThreadsResponse);
  rpc DeleteThread(DeleteThreadRequest) returns (DeleteThreadResponse);
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);
}

// ============================================================================
// Execution messages
// ============================================================================

message SendMessageRequest {
  string thread_id = 1;
  string user_id   = 2;
  string content   = 3;
  // run_id is generated by the session service and passed to the agent
  // so the agent knows which Redis stream key to write events to.
  string run_id    = 4;
}

message SendMessageResponse {
  // ID of the user Message record that was created.
  string message_id = 1;
  // ID of the Run that was started. Use with StreamEvents.
  string run_id = 2;
}

message StreamEventsRequest {
  string run_id = 1;
  // Resume from this offset. Omit (or pass "") for a fresh subscription.
  // Pass the cursor of the last received EventFrame to replay missed events.
  string last_event_id = 2;
}

message ResumeRunRequest {
  string thread_id = 1;
  string user_id   = 2;
  hahi.agent_event.ControlResponse control = 3;
  // Existing run stream key. When omitted, the agent falls back to thread_id.
  string run_id    = 4;
}

message ResumeRunResponse {
  string run_id = 1;
}

message CancelRunRequest {
  string thread_id = 1;
}

message CancelRunResponse {
  bool cancelled = 1;
}

message GetRunStatusRequest {
  string run_id = 1;
}

message GetRunStatusResponse {
  string status = 1;
  optional string active_request_id = 2;
}

// ============================================================================
// Thread / Message messages
// ============================================================================

message CreateThreadRequest {
  string user_id = 1;
  string title   = 2;
}

message ThreadProto {
  string id         = 1;
  string user_id    = 2;
  string title      = 3;
  string created_at = 4;
  string updated_at = 5;
}

message GetThreadRequest {
  string thread_id = 1;
}

message ListThreadsRequest {
  string user_id                    = 1;
  hahi.common.Pagination pagination = 2;
}

message ListThreadsResponse {
  repeated ThreadProto threads     = 1;
  hahi.common.PaginationMeta meta  = 2;
}

message DeleteThreadRequest {
  string thread_id = 1;
}

message DeleteThreadResponse {}

message ListMessagesRequest {
  string thread_id                  = 1;
  hahi.common.Pagination pagination = 2;
}

message ChatMessage {
  string      id         = 1;
  MessageRole role       = 2;
  string      content    = 3;
  string      created_at = 4;
}

message ListMessagesResponse {
  repeated ChatMessage messages  = 1;
  hahi.common.PaginationMeta meta = 2;
}
